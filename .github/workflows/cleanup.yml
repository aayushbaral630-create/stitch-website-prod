name: API Cleanup
on: push
jobs:
  cleanup:
      runs-on: ubuntu-latest
          steps:
                - name: Delete via API
                        run: |
                                  SHA=$(curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/contents/stitch%20website?ref=main | jq -r '.sha')
                                            if [ "$SHA" != "null" ]; then
                                                        curl -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -d '{"message": "Remove submodule via API", "sha": "'$SHA'", "branch": "main"}' https://api.github.com/repos/${{ github.repository }}/contents/stitch%20website
                                                                  else
                                                                              echo "Submodule not found or already deleted"
                                                                                        fi
                                                                                        
